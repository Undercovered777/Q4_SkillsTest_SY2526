<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Tracker</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- PyScript -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <py-config>
        packages = ["numpy", "matplotlib"]
    </py-config>

    <!-- Custom Colors -->
    <style>
        body {
            background-color: #0d6efd; /* blue */
        }
        .card-custom {
            background-color: #fff3cd; /* yellow */
            border-radius: 20px;
        }
        .btn-custom {
            background-color: #dc3545; /* red */
            color: white;
        }
        .btn-custom:hover {
            background-color: #c82333;
        }
        .title-text {
            color: #e83e8c; /* pink */
            font-weight: bold;
        }
        #output {
            background-color: #28a745; /* green */
            color: white;
            border-radius: 10px;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="card card-custom shadow-lg p-4" style="width: 400px;">
        <h3 class="text-center title-text mb-4">Attendance Tracker</h3>

        <form>
            <div class="mb-3">
                <label class="form-label fw-bold">Select Day</label>
                <select id="dayOfTheWeek" class="form-select">
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Absences</label>
                <input type="number" id="absences" class="form-control" placeholder="Enter number of absences">
            </div>

            <div class="d-grid">
                <input type="button" py-click="displaying" value="Submit" class="btn btn-custom">
            </div>
        </form>

        <div id="output" class="mt-3 p-2 text-center fs-5"></div>
    </div>
    <py-script src="main.py"></py-script>
</body>
</html>
